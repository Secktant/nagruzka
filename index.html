<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Нагрузка</title>
  <link rel="stylesheet" href="style.css">

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0e1116">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Нагрузка">
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">Нагрузка<small>финансовый календарь</small></div>
      <div class="month-nav" id="month-nav">
        <button id="prev-month" aria-label="Предыдущий месяц">‹</button>
        <div id="month-title"></div>
        <button id="next-month" aria-label="Следующий месяц">›</button>
      </div>
    </div>

    <div id="view-periods" class="view"><div id="periods"></div></div>
    <div id="view-debts" class="view" hidden></div>
    <div id="view-chart" class="view" hidden></div>
    <div id="view-settings" class="view" hidden></div>
  </div>

  <nav class="tabbar">
    <button class="tab active" data-tab="periods"><span class="ico">📅</span>Периоды</button>
    <button class="tab" data-tab="debts"><span class="ico">💳</span>Долги</button>
    <button class="tab" data-tab="chart"><span class="ico">📈</span>График</button>
    <button class="tab" data-tab="settings"><span class="ico">⚙️</span>Настройки</button>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <dialog id="modal">
    <button id="modal-close" type="button" aria-label="Закрыть">×</button>
    <div id="modal-body"></div>
  </dialog>

  <!-- Argon2 (hash-wasm 4.12.0, UMD): задаёт globalThis.hashwasm для js/crypto.js.
       integrity (SRI): браузер сверит хеш и НЕ выполнит файл, если он изменён.
       SHA-256: dcec617a2e1b700fa132d1583a186cb70611113395e869f2dd6cc82b415d3094 -->
  <script src="js/vendor/argon2.umd.min.js"
          integrity="sha384-tP0Wy54CKmng7i9EoTlPySD0hBx6Octj0VS6MfwlnUu111MPa+JLm0CCbep6XJ1W"></script>
  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW:', err));
      });
    }
  </script>
</body>
</html>
